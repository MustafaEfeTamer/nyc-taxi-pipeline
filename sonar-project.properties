# =====================================================
# SonarQube Proje Yapılandırması - NYC Taxi Pipeline
# =====================================================

# Projenin benzersiz kimliği (SonarQube panelinde görünür)
sonar.projectKey=nyc-taxi-pipeline

# Projenin görünen adı (SonarQube panelinde görünür)
sonar.projectName=NYC Taxi Big Data Pipeline

# Proje versiyonu
sonar.projectVersion=1.0

# ── Kaynak Kodu ─────────────────────────────────────
# Hangi klasörler analiz edilecek?
sonar.sources=ml_pipeline,spark_jobs,producer

# ── Test Kodu ────────────────────────────────────────
# Hangi klasörler test dosyası olarak değerlendirilecek?
sonar.tests=tests

# ── Python Versiyonu ─────────────────────────────────
# sonar.language=py KALDIRILDI: SonarQube auto-detect yapar,
# bu satır bazen "language not found" hatasına yol açar.
sonar.python.version=3.11

# ── Hariç Tutulacak Dosyalar ─────────────────────────
# Büyük veri dosyaları, cache, MLflow çıktıları analiz edilmez
sonar.exclusions=data/**,mlruns/**,mlartifacts/**,**/__pycache__/**,**/*.pyc,**/*.parquet,temp_plots/**,reports/**

# ── Coverage Raporu (pytest-cov çıktısı) ─────────────
# Pipeline'da: pytest --cov-report=xml:reports/coverage.xml
sonar.python.coverage.reportPaths=reports/coverage.xml

# ── JUnit Test Sonuçları ─────────────────────────────
# Pipeline'da: pytest --junitxml=reports/test-results.xml
sonar.python.xunit.reportPath=reports/test-results.xml

# ── Encoding ─────────────────────────────────────────
sonar.sourceEncoding=UTF-8
